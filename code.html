<!DOCTYPE html>
<html>
<body>
    <h2> the js String()Method</h2>
    <p>the string() method can convert a number to a string.</p>
    <p id="demo"></p>
    <p id="demo2"></p>
    <script>
        var x =70;
        var y =90;
        document.getElementById("demo").innerHTML =x +y;
        document.getElementById("demo2").innerHTML =String(x) + String(y);
    </script>
</body>
</html>
