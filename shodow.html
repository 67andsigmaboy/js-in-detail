<!DOCTYPE html>
<html>
    <body>
        <h2>today i do js error handling</h2>
        <p>this exampls demonstrates how to use <b>try...catch</b> blocks for error handling.</p>
        <p id="demo">hello guys</p>
        <script>
            try {
                addalert("welcome to js error handling");

                document.getElementById("demo").innerHTML = err.message;
            }

</html>
